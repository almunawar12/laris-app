<!doctype html>

<html class="light" lang="id">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Login | LARIS POS</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "secondary-container": "#fda77a",
                            "inverse-on-surface": "#eaf1ff",
                            "on-surface": "#121c28",
                            "on-primary": "#ffffff",
                            "on-tertiary-fixed-variant": "#004b74",
                            "on-tertiary-fixed": "#001d32",
                            "primary-container": "#f97316",
                            background: "#f8f9ff",
                            secondary: "#8f4d27",
                            "on-secondary-fixed-variant": "#713612",
                            "outline-variant": "#e0c0b1",
                            "on-primary-fixed": "#341100",
                            "surface-container-highest": "#d9e3f4",
                            primary: "#9d4300",
                            "tertiary-container": "#00a2f4",
                            "primary-fixed": "#ffdbca",
                            "on-primary-fixed-variant": "#783200",
                            "on-error": "#ffffff",
                            "error-container": "#ffdad6",
                            "surface-tint": "#9d4300",
                            "on-background": "#121c28",
                            "surface-container-lowest": "#ffffff",
                            surface: "#f8f9ff",
                            "on-secondary": "#ffffff",
                            "on-error-container": "#93000a",
                            "tertiary-fixed": "#cde5ff",
                            "surface-container-low": "#eef4ff",
                            "surface-container": "#e5eeff",
                            "primary-fixed-dim": "#ffb690",
                            "on-surface-variant": "#584237",
                            "on-tertiary-container": "#003554",
                            "surface-dim": "#d1dbec",
                            "secondary-fixed": "#ffdbca",
                            "tertiary-fixed-dim": "#93ccff",
                            "surface-container-high": "#dfe9fa",
                            tertiary: "#006398",
                            "on-secondary-container": "#773a16",
                            outline: "#8c7164",
                            "on-secondary-fixed": "#341100",
                            "inverse-primary": "#ffb690",
                            error: "#ba1a1a",
                            "inverse-surface": "#27313e",
                            "surface-bright": "#f8f9ff",
                            "secondary-fixed-dim": "#ffb690",
                            "surface-variant": "#d9e3f4",
                            "on-tertiary": "#ffffff",
                            "on-primary-container": "#582200",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        fontFamily: {
                            headline: ["Plus Jakarta Sans"],
                            body: ["Manrope"],
                            label: ["Manrope"],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            body {
                font-family: "Manrope", sans-serif;
            }
            h1,
            h2,
            h3 {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        </style>
    </head>
    <body class="bg-background text-on-surface overflow-hidden">
        <div class="flex h-screen w-full">
            <!-- Left Side: Visual & Brand Messaging -->
            <section
                class="hidden lg:flex flex-col justify-between w-1/2 p-12 relative bg-gradient-to-br from-primary-fixed to-secondary-container overflow-hidden"
            >
                <!-- Decorative Elements -->
                <div
                    class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"
                ></div>
                <div
                    class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-white/20 rounded-full blur-[100px] -mr-48 -mb-48"
                ></div>
                <!-- Brand Logo for Left Side -->
                <div class="relative z-10">
                    <span
                        class="font-headline font-black text-3xl tracking-tighter text-on-primary-fixed"
                        >LARIS</span
                    >
                </div>
                <!-- Illustration Area -->
                <div
                    class="relative z-10 flex flex-col items-center justify-center space-y-12"
                >
                    <div
                        class="w-full max-w-lg aspect-square rounded-[32px] overflow-hidden shadow-2xl transform -rotate-2 hover:rotate-0 transition-transform duration-700 bg-surface-container-lowest p-4"
                    >
                        <img
                            alt="Tumbuh Bersama LARIS"
                            class="w-full h-full object-cover rounded-[24px]"
                            data-alt="Modern retail store interior with vibrant orange accents, soft natural lighting, showing a clean point of sale desk area with a minimalist digital tablet"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5zs-saQ0370XBUlBozd7s0S4swvJGnNn51F5sYXLsCboxIC4cU49kndlF0Tft0njjibLYUD9DjFmOZJVMGM3fYHqze0XwoNFlWKysXdB81QhI9dYxDX8OHTorA3lnYX--IjVF5S3UUbGtAX0lu7WXksi9TrvSn7JG6Wxyfu1ZgMMk0hN1hX604XO6QGWbuKYM1NqJof2kHhEygwu2fyGffTl_qWkNZQAr2ePlV6gagD6FNhNg0y7FwWF71rjMchFgxFVBqYcoQik"
                        />
                    </div>
                    <div class="text-center max-w-md">
                        <h1
                            class="text-4xl lg:text-5xl font-extrabold text-on-primary-fixed leading-tight mb-4 tracking-tight"
                        >
                            Tumbuh Lebih Cepat Bersama LARIS
                        </h1>
                        <p
                            class="text-lg text-on-primary-fixed-variant opacity-80 font-medium"
                        >
                            Kelola bisnis UMKM Anda dengan lebih pintar dan
                            efisien.
                        </p>
                    </div>
                </div>
                <!-- Subtle Bottom Footer for Brand side -->
                <div
                    class="relative z-10 flex gap-4 text-on-primary-fixed-variant/60 text-sm font-semibold tracking-wider uppercase"
                >
                    <span>Efisiensi</span>
                    <span
                        class="w-1 h-1 rounded-full bg-primary/30 mt-2"
                    ></span>
                    <span>Keamanan</span>
                    <span
                        class="w-1 h-1 rounded-full bg-primary/30 mt-2"
                    ></span>
                    <span>Pertumbuhan</span>
                </div>
            </section>
            <!-- Right Side: Login Form -->
            <main
                class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 md:p-24 bg-surface-container-low"
            >
                <div class="w-full max-w-md space-y-8">
                    <!-- Mobile Logo (Hidden on Desktop) -->
                    <div class="lg:hidden text-center mb-8">
                        <span
                            class="font-headline font-black text-3xl tracking-tighter text-primary"
                            >LARIS</span
                        >
                    </div>
                    <header class="space-y-2">
                        <h2
                            class="text-3xl font-extrabold text-on-surface tracking-tight"
                        >
                            Selamat Datang Kembali
                        </h2>
                        <p class="text-on-surface-variant font-medium">
                            Silakan masuk ke akun Anda untuk melanjutkan.
                        </p>
                    </header>
                    <form class="space-y-6">
                        <!-- Identity Input -->
                        <div class="space-y-2">
                            <label
                                class="text-sm font-bold text-on-surface-variant uppercase tracking-widest font-label"
                                for="identity"
                            >
                                Email atau Nomor Handphone
                            </label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline"
                                >
                                    <span
                                        class="material-symbols-outlined text-[20px]"
                                        >mail</span
                                    >
                                </div>
                                <input
                                    class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline"
                                    id="identity"
                                    placeholder="Contoh: budi@email.com"
                                    type="text"
                                />
                            </div>
                        </div>
                        <!-- Password Input -->
                        <div class="space-y-2">
                            <label
                                class="text-sm font-bold text-on-surface-variant uppercase tracking-widest font-label"
                                for="password"
                            >
                                Kata Sandi
                            </label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline"
                                >
                                    <span
                                        class="material-symbols-outlined text-[20px]"
                                        >lock</span
                                    >
                                </div>
                                <input
                                    class="block w-full pl-12 pr-12 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline"
                                    id="password"
                                    placeholder="Masukkan kata sandi Anda"
                                    type="password"
                                />
                                <button
                                    class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors"
                                    type="button"
                                >
                                    <span
                                        class="material-symbols-outlined text-[20px]"
                                        >visibility</span
                                    >
                                </button>
                            </div>
                        </div>
                        <!-- Options Row -->
                        <div class="flex items-center justify-between">
                            <label
                                class="flex items-center gap-3 cursor-pointer group"
                            >
                                <div
                                    class="relative flex items-center justify-center"
                                >
                                    <input
                                        class="peer appearance-none w-5 h-5 border-2 border-outline-variant rounded-md checked:bg-primary checked:border-primary transition-all duration-200"
                                        type="checkbox"
                                    />
                                    <span
                                        class="material-symbols-outlined absolute text-white text-[14px] opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"
                                        style="
                                            font-variation-settings: &quot;FILL&quot;
                                                1;
                                        "
                                        >check</span
                                    >
                                </div>
                                <span
                                    class="text-sm font-semibold text-on-surface-variant group-hover:text-on-surface transition-colors"
                                    >Ingat Saya</span
                                >
                            </label>
                            <a
                                class="text-sm font-bold text-primary hover:text-on-primary-fixed-variant transition-colors"
                                href="#"
                                >Lupa Kata Sandi?</a
                            >
                        </div>
                        <!-- Primary Action -->
                        <button
                            class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-extrabold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all duration-150"
                            type="submit"
                        >
                            Masuk Sekarang
                        </button>
                    </form>
                    <!-- Divider -->
                    <div class="relative flex items-center py-4">
                        <div
                            class="flex-grow border-t border-outline-variant/30"
                        ></div>
                        <span
                            class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest bg-surface-container-low px-2"
                            >Atau masuk dengan</span
                        >
                        <div
                            class="flex-grow border-t border-outline-variant/30"
                        ></div>
                    </div>
                    <!-- Social Login -->
                    <button
                        class="w-full py-4 px-6 bg-surface-container-lowest border border-outline-variant/20 rounded-xl flex items-center justify-center gap-3 hover:bg-surface-container-high active:scale-95 transition-all duration-150 group"
                        type="button"
                    >
                        <svg class="w-5 h-5" viewbox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"
                            ></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"
                            ></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05"
                            ></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12.16-4.53z"
                                fill="#EA4335"
                            ></path>
                        </svg>
                        <span class="text-on-surface font-bold">Google</span>
                    </button>
                    <!-- Footer -->
                    <footer class="text-center pt-8">
                        <p class="text-on-surface-variant font-medium">
                            Belum punya akun?
                            <a
                                class="text-primary font-bold hover:underline ml-1"
                                href="#"
                                >Daftar Sekarang</a
                            >
                        </p>
                    </footer>
                </div>
            </main>
        </div>
    </body>
</html>
